name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag (for example: v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary and app bundle
        run: |
          chmod +x .github/scripts/package_macos_release.sh
          .github/scripts/package_macos_release.sh "${{ inputs.tag_name }}" "${{ matrix.target }}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.app.zip
            dist/*.dmg
