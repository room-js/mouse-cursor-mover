name: Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag (for example: v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload (${{ matrix.target }})
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: Package binary and app bundle
        run: |
          chmod +x .github/scripts/package_macos_release.sh
          .github/scripts/package_macos_release.sh "${TAG_NAME}" "${{ matrix.target }}"

      - name: Create app archive and dmg
        run: |
          chmod +x .github/scripts/release_tag_env.sh
          eval "$(.github/scripts/release_tag_env.sh "${TAG_NAME}" "${{ matrix.target }}")"

          rm -f "${APP_ARCHIVE_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "${APP_ARCHIVE_PATH}"

          rm -rf "${DMG_ROOT}"
          mkdir -p "${DMG_ROOT}"
          cp -R "${APP_DIR}" "${DMG_ROOT}/"
          ln -s /Applications "${DMG_ROOT}/Applications"

          rm -f "${DMG_PATH}"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${DMG_ROOT}" -ov -format UDZO "${DMG_PATH}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            dist/*.tar.gz
            dist/*.app.zip
            dist/*.dmg
