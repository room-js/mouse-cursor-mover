name: Release App

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  upload-release-assets:
    name: Build and Upload Assets (${{ matrix.target }})
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-bundle

      - name: Package binary and app bundle
        run: |
          chmod +x .github/scripts/package_macos_release.sh
          .github/scripts/package_macos_release.sh "${{ needs.release-please.outputs.tag_name }}" "${{ matrix.target }}"

      - name: Create app archive and dmg
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          chmod +x .github/scripts/release_tag_env.sh
          eval "$(.github/scripts/release_tag_env.sh "${TAG_NAME}" "${{ matrix.target }}")"

          rm -f "${APP_ARCHIVE_PATH}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "${APP_ARCHIVE_PATH}"

          rm -rf "${DMG_ROOT}"
          mkdir -p "${DMG_ROOT}"
          cp -R "${APP_DIR}" "${DMG_ROOT}/"
          ln -s /Applications "${DMG_ROOT}/Applications"

          rm -f "${DMG_PATH}"
          hdiutil create -volname "${APP_NAME}" -srcfolder "${DMG_ROOT}" -ov -format UDZO "${DMG_PATH}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.app.zip
            dist/*.dmg
